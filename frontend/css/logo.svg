<svg viewBox="180 100 240 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Gold Gradient -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5cc"></stop>
      <stop offset="25%" stop-color="#f7d774"></stop>
      <stop offset="50%" stop-color="#d4af37"></stop>
      <stop offset="75%" stop-color="#b8962e"></stop>
      <stop offset="100%" stop-color="#fff2b0"></stop>
    </linearGradient>
  </defs>

  <!-- Crossed Fork -->
  <g transform="rotate(-25 300 180)">
    <rect x="296" y="140" width="3" height="60" fill="url(#goldGradient)"></rect>
    <rect x="289" y="120" width="2.5" height="18" fill="url(#goldGradient)"></rect>
    <rect x="293" y="120" width="2.5" height="18" fill="url(#goldGradient)"></rect>
    <rect x="297" y="120" width="2.5" height="18" fill="url(#goldGradient)"></rect>
    <rect x="301" y="120" width="2.5" height="18" fill="url(#goldGradient)"></rect>
  </g>

  <!-- Crossed Spoon -->
  <g transform="rotate(25 300 180)">
    <ellipse cx="300" cy="130" rx="8" ry="11" fill="url(#goldGradient)"></ellipse>
    <rect x="297" y="140" width="5" height="60" rx="2.5" fill="url(#goldGradient)"></rect>
  </g>

  <!-- BISTRO -->
  <text x="300" y="230" text-anchor="middle" font-family="Playfair Display, serif" font-size="38" fill="url(#goldGradient)" letter-spacing="2">
    BISTRO
  </text>

  <!-- Divider -->
  <line x1="240" y1="245" x2="360" y2="245" stroke="url(#goldGradient)" stroke-width="1.2"></line>
  <circle cx="300" cy="245" r="2.2" fill="url(#goldGradient)"></circle>

  <!-- RESERVE -->
  <text x="300" y="270" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="16" fill="url(#goldGradient)" letter-spacing="5">
    RESERVE
  </text>

</svg>