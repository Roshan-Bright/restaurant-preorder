<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0b0b"></rect>

  <!-- Circular Frame -->
  <circle cx="300" cy="200" r="130" fill="none" stroke="#d4af37" stroke-width="3"></circle>

  <!-- Fork (Left) -->
  <g transform="translate(240,140)">
    <rect x="8" y="20" width="4" height="60" fill="#d4af37"></rect>
    <rect x="0" y="0" width="3" height="20" fill="#d4af37"></rect>
    <rect x="6" y="0" width="3" height="20" fill="#d4af37"></rect>
    <rect x="12" y="0" width="3" height="20" fill="#d4af37"></rect>
    <rect x="18" y="0" width="3" height="20" fill="#d4af37"></rect>
  </g>

  <!-- Spoon (Right) -->
  <g transform="translate(330,140)">
    <ellipse cx="10" cy="10" rx="8" ry="12" fill="#d4af37"></ellipse>
    <rect x="7" y="20" width="6" height="60" rx="3" fill="#d4af37"></rect>
  </g>

  <!-- Bistro Text -->
  <text x="300" y="230" text-anchor="middle" font-family="Playfair Display, serif" font-size="48" fill="#ffffff" letter-spacing="2">
    BISTRO
  </text>

  <!-- Divider -->
  <line x1="220" y1="245" x2="380" y2="245" stroke="#d4af37" stroke-width="1"></line>

  <!-- Reserve Text -->
  <text x="300" y="275" text-anchor="middle" font-family="Montserrat, sans-serif" font-size="20" fill="#d4af37" letter-spacing="6">
    RESERVE
  </text>

</svg>