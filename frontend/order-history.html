<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — BistroReserve</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { padding-top: 72px; background: var(--cream); }

    .page-header {
      background: linear-gradient(135deg, var(--burgundy-deep), var(--burgundy-mid));
      padding: 3rem 0; position: relative; overflow: hidden;
    }
    .page-header::before {
      content:''; position:absolute; inset:0;
      background:url('https://images.unsplash.com/photo-1466978913421-dad2ebd01d17?w=1200') center/cover;
      opacity:0.06;
    }
    .page-header .container { position: relative; z-index: 1; }
    .page-header h1 { color: var(--white); }
    .page-header p  { color: rgba(255,255,255,0.6); margin-top: 0.4rem; }

    /* Filter bar */
    .filter-bar {
      display: flex; align-items: center; gap: 1rem;
      flex-wrap: wrap; margin-bottom: 2rem;
      background: var(--white); padding: 1rem 1.4rem;
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
    }
    .filter-bar label { font-size: 0.82rem; font-weight: 500; color: var(--text-mid); }
    .filter-select {
      padding: 0.5rem 1rem; border: 1.5px solid var(--cream-dark);
      border-radius: 50px; font-size: 0.85rem; color: var(--text-dark);
      background: var(--cream); cursor: pointer;
    }
    .filter-select:focus { border-color: var(--gold); outline: none; }

    /* Order cards */
    .orders-list { display: flex; flex-direction: column; gap: 1.5rem; }

    .order-card {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm); overflow: hidden; transition: var(--transition);
    }
    .order-card:hover { box-shadow: var(--shadow-md); }

    .order-card-header {
      padding: 1.2rem 1.6rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--cream-dark);
      flex-wrap: wrap; gap: 0.75rem;
    }
    .order-meta { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .order-id   { font-size: 0.8rem; color: var(--text-light); }
    .order-restaurant { font-family: var(--font-display); font-size: 1.2rem; color: var(--burgundy-deep); }
    .order-datetime { font-size: 0.82rem; color: var(--text-mid); display: flex; align-items: center; gap: 0.4rem; }

    .order-card-body { padding: 1.2rem 1.6rem; }
    .order-items-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .order-item-chip {
      background: var(--cream); border-radius: 50px;
      padding: 0.3rem 0.85rem; font-size: 0.78rem; color: var(--text-mid);
    }

    .order-card-footer {
      padding: 1rem 1.6rem;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--cream); flex-wrap: wrap; gap: 0.75rem;
    }
    .order-total { font-family: var(--font-display); font-size: 1.3rem; color: var(--burgundy-deep); }
    .order-placed { font-size: 0.78rem; color: var(--text-light); }

    /* Empty state */
    .empty-orders {
      text-align: center; padding: 5rem 2rem;
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }
    .empty-orders i { font-size: 3.5rem; color: var(--cream-dark); margin-bottom: 1rem; }
    .empty-orders h3 { font-family: var(--font-display); margin-bottom: 0.5rem; color: var(--text-mid); }
    .empty-orders p  { color: var(--text-light); font-size: 0.9rem; margin-bottom: 1.5rem; }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--white); border-radius: var(--radius-md);
      padding: 1.2rem 1.4rem; box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 1rem;
    }
    .stat-icon {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .stat-icon.burgundy { background: rgba(74,14,30,0.1); color: var(--burgundy); }
    .stat-icon.gold     { background: rgba(201,151,58,0.1); color: var(--gold); }
    .stat-icon.green    { background: rgba(39,174,96,0.1); color: var(--success); }
    .stat-icon.blue     { background: rgba(52,152,219,0.1); color: #3498db; }
    .stat-value { font-family: var(--font-display); font-size: 1.5rem; color: var(--burgundy-deep); line-height: 1; }
    .stat-label { font-size: 0.78rem; color: var(--text-light); margin-top: 0.2rem; }

    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2,1fr); }
      .order-card-header { flex-direction: column; align-items: flex-start; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-logo">🍽️ Bistro<span>Reserve</span></div>
  <ul class="nav-links">
    <li><a href="dashboard.html">Restaurants</a></li>
    <li><a href="order-history.html" style="color:var(--gold-light)">My Orders</a></li>
    <li><a href="#" id="logoutBtn" class="nav-cta">Logout</a></li>
  </ul>
</nav>

<div class="toast-container" id="toastContainer"></div>

<div class="page-header">
  <div class="container">
    <h1>My Orders</h1>
    <p>Track and manage all your pre-orders</p>
  </div>
</div>

<main class="container" style="padding: 2.5rem 1.5rem;">

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-icon burgundy"><i class="fa-solid fa-receipt"></i></div><div><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Orders</div></div></div>
    <div class="stat-card"><div class="stat-icon gold"><i class="fa-regular fa-clock"></i></div><div><div class="stat-value" id="statPending">—</div><div class="stat-label">Pending</div></div></div>
    <div class="stat-card"><div class="stat-icon green"><i class="fa-solid fa-check-circle"></i></div><div><div class="stat-value" id="statCompleted">—</div><div class="stat-label">Completed</div></div></div>
    <div class="stat-card"><div class="stat-icon blue"><i class="fa-solid fa-indian-rupee-sign"></i></div><div><div class="stat-value" id="statSpent">—</div><div class="stat-label">Total Spent</div></div></div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <label>Filter by status:</label>
    <select class="filter-select" id="statusFilter" onchange="filterOrders()">
      <option value="">All Orders</option>
      <option value="Pending">Pending</option>
      <option value="Confirmed">Confirmed</option>
      <option value="Preparing">Preparing</option>
      <option value="Ready">Ready</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
    <span style="flex:1"></span>
    <button class="btn btn-primary" onclick="loadOrders()" style="padding:0.5rem 1.2rem;font-size:0.85rem">
      <i class="fa-solid fa-refresh"></i> Refresh
    </button>
  </div>

  <!-- Orders list -->
  <div id="ordersList">
    <div style="text-align:center;padding:3rem;color:var(--text-light)">
      <span class="spinner spinner-dark"></span>
      <p style="margin-top:1rem">Loading your orders...</p>
    </div>
  </div>

</main>

<script>
  const API   = 'http://localhost:5000/api';
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || 'null');
  if (!token || !user) window.location.href = 'login.html';

  document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); localStorage.clear(); window.location.href = 'login.html'; });
  window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10));

  let allOrders = [];

  const statusIcons = {
    'Pending':'⏳','Confirmed':'✅','Preparing':'👨‍🍳','Ready':'🔔','Completed':'🎉','Cancelled':'❌'
  };

  async function loadOrders() {
    document.getElementById('ordersList').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text-light)"><span class="spinner spinner-dark"></span><p style="margin-top:1rem">Loading...</p></div>`;
    try {
      const res  = await fetch(`${API}/orders/my`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      allOrders  = data.orders || [];
      updateStats(allOrders);
      filterOrders();
    } catch (err) {
      document.getElementById('ordersList').innerHTML = `<div style="text-align:center;padding:3rem;color:var(--error)"><i class="fa-solid fa-triangle-exclamation" style="font-size:2rem"></i><p style="margin-top:1rem">Could not load orders.</p></div>`;
    }
  }

  function updateStats(orders) {
    document.getElementById('statTotal').textContent     = orders.length;
    document.getElementById('statPending').textContent   = orders.filter(o => o.status === 'Pending').length;
    document.getElementById('statCompleted').textContent = orders.filter(o => o.status === 'Completed').length;
    const spent = orders.reduce((s,o) => s + parseFloat(o.total_price), 0);
    document.getElementById('statSpent').textContent = '₹' + spent.toFixed(0);
  }

  function filterOrders() {
    const status   = document.getElementById('statusFilter').value;
    const filtered = status ? allOrders.filter(o => o.status === status) : allOrders;
    renderOrders(filtered);
  }

  function renderOrders(orders) {
    const list = document.getElementById('ordersList');
    if (orders.length === 0) {
      list.innerHTML = `<div class="empty-orders">
        <i class="fa-solid fa-receipt"></i>
        <h3>No Orders Yet</h3>
        <p>You haven't placed any orders. Start exploring restaurants!</p>
        <a href="dashboard.html" class="btn btn-gold">Browse Restaurants</a>
      </div>`;
      return;
    }

    list.innerHTML = `<div class="orders-list">` +
      orders.map(o => {
        const d   = new Date(o.scheduled_date);
        const dateStr = d.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
        const items   = (o.items||[]).map(i => `<span class="order-item-chip">${i.quantity}× ${i.name}</span>`).join('');
        const created = new Date(o.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        return `
        <div class="order-card">
          <div class="order-card-header">
            <div>
              <div class="order-id">Order #${o.id}</div>
              <div class="order-restaurant">${o.restaurant_name}</div>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
              <div class="order-datetime"><i class="fa-regular fa-calendar"></i> ${dateStr} at ${o.scheduled_time}</div>
              <span class="badge badge-${o.status.toLowerCase()}">${statusIcons[o.status]||''} ${o.status}</span>
            </div>
          </div>
          <div class="order-card-body">
            <div class="order-items-list">${items || '<span style="color:var(--text-light);font-size:0.82rem">No items data</span>'}</div>
          </div>
          <div class="order-card-footer">
            <span class="order-total">₹${parseFloat(o.total_price).toFixed(2)}</span>
            <span class="order-placed">Placed on ${created}</span>
          </div>
        </div>`}).join('') + `</div>`;
  }

  loadOrders();
</script>
</body>
</html>
